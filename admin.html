<!DOCTYPE html>
<html>
<head>
    <title>AI Summary Tool Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Georgia', serif;
            background: #f5f5f0;
            color: #111;
            padding: 30px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 24px; margin-bottom: 16px; }
        .row { display: flex; gap: 10px; margin-bottom: 16px; }
        input[type="password"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 7px;
            font-size: 14px;
        }
        button {
            padding: 10px 14px;
            border: none;
            background: #111;
            color: white;
            border-radius: 7px;
            cursor: pointer;
            font-size: 14px;
        }
        button:disabled { background: #999; cursor: not-allowed; }
        .error { color: #c00; margin-bottom: 10px; display: none; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            text-align: left;
            border-bottom: 1px solid #eee;
            padding: 8px 6px;
            vertical-align: top;
        }
        th { color: #555; }
        .muted { color: #888; }
    </style>
</head>
<body>
<div class="container">
    <h1>Admin Dashboard</h1>
    <div class="row">
        <input type="password" id="admin-password" placeholder="Admin password" />
        <button id="load-btn" onclick="loadAdmin()">Load</button>
    </div>
    <div id="error" class="error"></div>
    <table id="admin-table" style="display:none;">
        <thead>
            <tr>
                <th>Question</th>
                <th>Answer</th>
                <th>User Email</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="admin-tbody"></tbody>
    </table>
</div>

<script>
    const API_BASE = "https://ai-summary-tool-5j6g.onrender.com";

    async function loadAdmin() {
        const password = document.getElementById("admin-password").value;
        const error = document.getElementById("error");
        const btn = document.getElementById("load-btn");
        error.style.display = "none";
        btn.disabled = true;
        btn.innerText = "Loading...";

        try {
            const response = await fetch(`${API_BASE}/admin/questions`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password })
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || "Unauthorized.");
            }
            renderTable(data.items || []);
        } catch (e) {
            error.innerText = e.message || "Failed to load.";
            error.style.display = "block";
        } finally {
            btn.disabled = false;
            btn.innerText = "Load";
        }
    }

    function renderTable(items) {
        const table = document.getElementById("admin-table");
        const tbody = document.getElementById("admin-tbody");
        tbody.innerHTML = "";
        items.forEach((item) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${escapeHtml(item.question || "")}</td>
                <td>${escapeHtml(item.answer || "")}</td>
                <td class="muted">${escapeHtml(item.email || "")}</td>
                <td class="muted">${escapeHtml(item.created_at || "")}</td>
            `;
            tbody.appendChild(tr);
        });
        table.style.display = "table";
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
