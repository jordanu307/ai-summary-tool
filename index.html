<!DOCTYPE html>
<html>
<head>
    <title>AI Summary Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Georgia', serif;
            min-height: 100vh;
            background-color: #f5f5f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 28px; font-weight: bold; margin-bottom: 8px; color: #111; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }
        #auth-section h2 { font-size: 20px; margin-bottom: 20px; color: #111; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; padding: 11px 14px; font-size: 15px;
            border: 1px solid #ddd; border-radius: 7px; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: #111; }
        .btn {
            width: 100%; padding: 12px; background: #111; color: white;
            border: none; border-radius: 7px; font-size: 15px; cursor: pointer;
            margin-top: 6px; transition: background 0.2s;
        }
        .btn:hover { background: #333; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        .toggle-text { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
        .toggle-text a { color: #111; cursor: pointer; text-decoration: underline; }
        .error-msg {
            background: #fff0f0; color: #c00; padding: 10px 14px;
            border-radius: 7px; font-size: 13px; margin-bottom: 14px; display: none;
        }
        .success-msg {
            background: #f0fff4; color: #080; padding: 10px 14px;
            border-radius: 7px; font-size: 13px; margin-bottom: 14px; display: none;
        }
        #app-section { display: none; }
        .user-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee;
        }
        .user-bar span { font-size: 13px; color: #888; }
        .logout-btn {
            font-size: 13px; color: #888; background: none;
            border: none; cursor: pointer; text-decoration: underline; padding: 0;
        }
        .logout-btn:hover { color: #111; }
        #result {
            margin-top: 20px; padding: 16px; background: #f9f9f9;
            border-radius: 8px; font-size: 15px; line-height: 1.7; color: #222; display: none;
        }
        .otp-input {
            letter-spacing: 6px; font-size: 24px; text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>AI Summary Tool</h1>
    <p class="subtitle">Ask anything. Get a clear 3-sentence answer.</p>

    <div id="auth-section">
        <div id="error-box" class="error-msg"></div>
        <div id="success-box" class="success-msg"></div>

        <!-- Login Form -->
        <div id="login-form">
            <h2>Sign in</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" />
            </div>
            <button class="btn" onclick="signIn()">Sign In</button>
            <div class="toggle-text">
                Don't have an account? <a onclick="showSignup()">Sign up</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" style="display:none;">
            <h2>Create account</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="At least 6 characters" />
            </div>
            <button class="btn" onclick="signUp()">Create Account</button>
            <div class="toggle-text">
                Already have an account? <a onclick="showLogin()">Sign in</a>
            </div>
        </div>

        <!-- OTP Verification Form -->
        <div id="otp-form" style="display:none;">
            <h2>Verify your email</h2>
            <p style="color:#888; font-size:13px; margin-bottom:20px;">We sent a 6-digit code to <span id="otp-email-display" style="color:#111;"></span></p>
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" id="otp-code" class="otp-input" placeholder="000000" maxlength="6" />
            </div>
            <button class="btn" onclick="verifyOTP()">Verify</button>
            <div class="toggle-text">
                Didn't get it? <a onclick="resendOTP()">Resend code</a>
            </div>
        </div>
    </div>

    <!-- App (shown after login) -->
    <div id="app-section">
        <div class="user-bar">
            <span id="user-email-display"></span>
            <button class="logout-btn" onclick="signOut()">Sign out</button>
        </div>
        <div class="form-group">
            <input type="text" id="topic" placeholder="What do you want to learn about?" />
        </div>
        <button class="btn" id="ask-btn" onclick="askAI()">Ask AI</button>
        <div id="result"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://lbxfotqoezbekppmafab.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxieGZvdHFvZXpiZWtwcG1hZmFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MzM0ODAsImV4cCI6MjA4ODUwOTQ4MH0.a6g9IyD9NCFHUnDAHyJLUfXjLxYBnqE3k7AI7Y8apMI";

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let pendingEmail = "";

    window.addEventListener("load", async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) showApp(session.user.email);
    });

    sb.auth.onAuthStateChange((event, session) => {
        if (event === "SIGNED_IN" && session) showApp(session.user.email);
        if (event === "SIGNED_OUT") showAuth();
    });

    function showApp(email) {
        document.getElementById("auth-section").style.display = "none";
        document.getElementById("app-section").style.display = "block";
        document.getElementById("user-email-display").innerText = email;
    }

    function showAuth() {
        document.getElementById("auth-section").style.display = "block";
        document.getElementById("app-section").style.display = "none";
        showLogin();
    }

    function showSignup() {
        document.getElementById("login-form").style.display = "none";
        document.getElementById("signup-form").style.display = "block";
        document.getElementById("otp-form").style.display = "none";
        clearMessages();
    }

    function showLogin() {
        document.getElementById("login-form").style.display = "block";
        document.getElementById("signup-form").style.display = "none";
        document.getElementById("otp-form").style.display = "none";
        clearMessages();
    }

    function showOTP(email) {
        document.getElementById("login-form").style.display = "none";
        document.getElementById("signup-form").style.display = "none";
        document.getElementById("otp-form").style.display = "block";
        document.getElementById("otp-email-display").innerText = email;
        clearMessages();
    }

    function showError(msg) {
        const box = document.getElementById("error-box");
        box.innerText = msg;
        box.style.display = "block";
        document.getElementById("success-box").style.display = "none";
    }

    function showSuccess(msg) {
        const box = document.getElementById("success-box");
        box.innerText = msg;
        box.style.display = "block";
        document.getElementById("error-box").style.display = "none";
    }

    function clearMessages() {
        document.getElementById("error-box").style.display = "none";
        document.getElementById("success-box").style.display = "none";
    }

    async function signIn() {
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        if (!email || !password) return showError("Please fill in all fields.");
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) showError(error.message);
    }

    async function signUp() {
        const email = document.getElementById("signup-email").value;
        const password = document.getElementById("signup-password").value;
        if (!email || !password) return showError("Please fill in all fields.");
        if (password.length < 6) return showError("Password must be at least 6 characters.");

        const { error } = await sb.auth.signUp({ email, password });
        if (error) {
            showError(error.message);
        } else {
            pendingEmail = email;
            showOTP(email);
            showSuccess("Check your email for a 6-digit verification code!");
        }
    }

    async function verifyOTP() {
        const code = document.getElementById("otp-code").value.trim();
        if (!code || code.length !== 6) return showError("Please enter the 6-digit code.");

        const { error } = await sb.auth.verifyOtp({
            email: pendingEmail,
            token: code,
            type: "signup"
        });

        if (error) {
            showError("Invalid or expired code. Try again.");
        }
        // if success, onAuthStateChange will fire and show the app automatically
    }

    async function resendOTP() {
        const { error } = await sb.auth.resend({
            type: "signup",
            email: pendingEmail
        });
        if (error) {
            showError(error.message);
        } else {
            showSuccess("New code sent! Check your email.");
        }
    }

    async function signOut() {
        await sb.auth.signOut();
    }

    async function askAI() {
        const topic = document.getElementById("topic").value.trim();
        const btn = document.getElementById("ask-btn");
        const result = document.getElementById("result");

        if (!topic) return;

        const { data: { session } } = await sb.auth.getSession();
        if (!session) return showAuth();

        btn.disabled = true;
        btn.innerText = "Thinking...";
        result.style.display = "none";

        try {
            const response = await fetch("https://ai-summary-tool-5j6g.onrender.com/ask", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${session.access_token}`
                },
                body: JSON.stringify({ topic })
            });

            const data = await response.json();
            if (response.status === 401) return showAuth();
            result.innerText = data.answer || data.error;
            result.style.display = "block";
        } catch (error) {
            result.innerText = "Something went wrong. Try again.";
            result.style.display = "block";
        } finally {
            btn.disabled = false;
            btn.innerText = "Ask AI";
        }
    }
</script>
</body>
</html>
